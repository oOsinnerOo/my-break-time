<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแจ้งเวลาพัก - Ultimate Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            transition: background-color 0.3s, box-shadow 0.3s, transform 0.2s, color 0.3s;
        }

        body {
            font-family: 'Kanit', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
            background-color: #f8fafc; overflow-x: hidden; perspective: 1000px;
        }
        body.dark-mode { background-color: #0f172a; color: #f8fafc; }

        .container {
            display: flex; flex-direction: column; gap: 16px;
            width: 100%; max-width: 400px; position: relative;
        }

        /* 📊 Dashboard โควตาเวลา */
        .dashboard {
            background: #ffffff; border-radius: 24px; padding: 20px;
            box-shadow: 0 10px 25px rgba(148, 163, 184, 0.12); border: 1px solid #e2e8f0;
        }
        body.dark-mode .dashboard { background: #1e293b; border-color: #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .dash-title { font-size: 14px; color: #64748b; font-weight: bold; }
        body.dark-mode .dash-title { color: #94a3b8; }
        
        .quota-setting { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 4px; }
        body.dark-mode .quota-setting { color: #94a3b8; }
        .quota-input {
            width: 55px; padding: 4px 6px; border: 1px solid #cbd5e1; border-radius: 8px;
            font-family: inherit; font-weight: bold; text-align: center; color: #0f172a; background: #f8fafc;
        }
        body.dark-mode .quota-input { background: #0f172a; border-color: #475569; color: #ffffff; }

        .time-grid { display: flex; justify-content: space-around; margin-top: 10px; }
        .time-box { display: flex; flex-direction: column; text-align: center; }
        .time-val { font-size: 24px; font-weight: 700; color: #0f172a; }
        body.dark-mode .time-val { color: #ffffff; }
        .time-lbl { font-size: 11px; color: #94a3b8; }
        
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        body.dark-mode .progress-bar { background: #334155; }
        .progress-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #38bdf8, #c084fc); transition: width 0.5s ease; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; flex-wrap: wrap; gap: 10px; }
        .app-title { font-size: 18px; font-weight: 700; color: #334155; margin: 0; }
        body.dark-mode .app-title { color: #f1f5f9; }

        .controls-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; flex: 1; }
        .theme-toggle, .mute-toggle, .gender-toggle {
            font-size: 11px; font-weight: 500; padding: 6px 10px; border-radius: 30px;
            background: #ffffff; color: #4a4a4c; cursor: pointer; user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
        }
        body.dark-mode .theme-toggle, body.dark-mode .mute-toggle, body.dark-mode .gender-toggle { background: #1e293b; color: #ffffff; border-color: #334155; }

        /* ✨ การ์ดปุ่มกดแบบ Dynamic */
        .action-card {
            display: flex; flex-direction: column; align-items: center;
            background-color: #ffffff; padding: 14px; border-radius: 24px;
            box-shadow: 0 8px 20px rgba(148, 163, 184, 0.1); border: 1px solid #f1f5f9;
            cursor: pointer; user-select: none; position: relative; transform-style: preserve-3d;
        }
        body.dark-mode .action-card { background-color: #1e293b; border-color: #334155; }

        .action-card:hover:not(.expanded) { box-shadow: 0 0 25px var(--hover-color); transform: translateY(-3px) scale(1.02); }

        .capsule {
            width: 100%; padding: 16px 0; border-radius: 100px;
            text-align: center; font-size: 26px; font-weight: 700;
            letter-spacing: 0.5px; margin-bottom: 8px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .helper-text {
            font-size: 13px; color: #64748b; background: #f8fafc;
            padding: 4px 14px; border-radius: 20px; font-weight: 500;
        }
        body.dark-mode .helper-text { background: #0f172a; color: #38bdf8; }

        .live-timer { display: none; font-size: min(5vh, 5vw, 42px); font-weight: 500; margin-top: 10px; opacity: 0.9; }
        .action-card.expanded .live-timer { display: block; }

        /* 🎭 แอนิเมชันเปิดหน้าต่างแบบการ์ตูน 3D */
        .action-card.expanded {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            max-width: none; border-radius: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; gap: 6vh; overflow: hidden; cursor: default; border: none;
            background: var(--expand-bg-light);
            animation: cartoon-pop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        body.dark-mode .action-card.expanded { background: var(--expand-bg-dark); }
        
        @keyframes cartoon-pop {
            0% { transform: scale(0.2) rotateY(-90deg) rotateX(20deg); opacity: 0; border-radius: 100px; }
            60% { transform: scale(1.04) rotateY(10deg); }
            100% { transform: scale(1) rotateY(0deg) rotateX(0deg); opacity: 1; border-radius: 0; }
        }

        .action-card.expanded .capsule {
            width: 88vw; max-width: 1300px; height: 46vh; max-height: 460px;
            font-size: min(9vh, 7vw, 85px); font-weight: 700; border-radius: 1000px;
            margin-bottom: 0; box-shadow: 0 25px 50px rgba(0,0,0,0.08), inset 0 -8px 0 rgba(0,0,0,0.1);
        }
        body.dark-mode .action-card.expanded .capsule { box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .action-card.expanded .helper-text { display: none; }
        .action-card.expanded .edit-btn { display: none; }

        .back-box {
            display: none; width: 75vw; max-width: 900px; height: 11vh; max-height: 85px; min-height: 65px;
            background: #ffffff; border: 3px dashed #cbd5e1; border-radius: 100px;
            cursor: pointer; align-items: center; justify-content: center;
        }
        .action-card.expanded .back-box { display: flex; }
        .back-box:hover { background: #f8fafc; border-color: #64748b; transform: scale(1.03); }
        .back-title { font-size: min(4.2vh, 36px); font-weight: 700; color: #64748b; }
        body.dark-mode .back-box { background: #1e293b; border-color: #475569; }
        body.dark-mode .back-title { color: #94a3b8; }

        .particle { position: absolute; pointer-events: none; border-radius: 50%; animation: float-up forwards ease-out; z-index: 100; }
        @keyframes float-up {
            0% { transform: translateY(10px) scale(0.6); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120px) translateX(var(--dx)); scale(1.4); opacity: 0; }
        }

        /* ปุ่มจัดการกิจกรรม */
        .edit-btn {
            position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
            background: rgba(255,255,255,0.9); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 14px; z-index: 10;
        }
        body.dark-mode .edit-btn { background: #334155; }
        
        .add-act-btn {
            background: #f1f5f9; border: 2px dashed #cbd5e1; color: #64748b;
            padding: 16px; text-align: center; border-radius: 24px; font-weight: 700;
            cursor: pointer; margin-bottom: 5px; box-shadow: none;
        }
        .add-act-btn:hover { background: #e2e8f0; border-color: #94a3b8; }
        body.dark-mode .add-act-btn { background: #1e293b; border-color: #475569; color: #94a3b8; }
        body.dark-mode .add-act-btn:hover { background: #334155; }

        /* Modal จัดการกิจกรรม */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 100000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 350px;
            display: flex; flex-direction: column; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        body.dark-mode .modal-box { background: #1e293b; color: #f8fafc; border: 1px solid #334155; }
        .modal-box input, .modal-box select {
            padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; font-family: 'Kanit'; font-size: 14px;
        }
        body.dark-mode .modal-box input, body.dark-mode .modal-box select { background: #0f172a; border-color: #475569; color: white; }
        .modal-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; font-family: 'Kanit'; cursor: pointer; }

        /* 📜 ตารางสรุปประวัติ */
        .history-box {
            background: #ffffff; border-radius: 24px; padding: 20px;
            box-shadow: 0 10px 25px rgba(148, 163, 184, 0.08); border: 1px solid #e2e8f0; width: 100%;
        }
        body.dark-mode .history-box { background: #1e293b; border-color: #334155; }
        .history-title { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        body.dark-mode .history-title { color: #cbd5e1; }
        
        .history-actions { display: flex; gap: 10px; font-size: 11px; font-weight: normal; flex-wrap: wrap; }
        .btn-copy-summary { color: #38bdf8; cursor: pointer; }
        .btn-export-csv { color: #10b981; cursor: pointer; }
        .btn-clear-history { color: #ef4444; cursor: pointer; }

        .history-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        .history-table th { color: #94a3b8; padding: 8px 4px; font-weight: 500; border-bottom: 1px solid #f1f5f9; }
        body.dark-mode .history-table th { border-bottom-color: #334155; }
        .history-table td { padding: 10px 4px; border-bottom: 1px solid #f8fafc; color: #334155; }
        body.dark-mode .history-table td { border-bottom-color: #1e293b; color: #e2e8f0; }
        .empty-log { text-align: center; color: #cbd5e1; padding: 20px 0; font-size: 13px; }

        .pagination-btn {
            display: block; width: 100%; text-align: center; padding: 8px; margin-top: 12px;
            font-size: 12px; color: #64748b; font-weight: bold; cursor: pointer;
            border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; user-select: none;
        }
        .pagination-btn:hover { background: #f1f5f9; color: #0f172a; }
        body.dark-mode .pagination-btn { background: #0f172a; border-color: #334155; color: #94a3b8; }
        body.dark-mode .pagination-btn:hover { background: #1e293b; color: #ffffff; }

        .success-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(34, 197, 94, 0.96); backdrop-filter: blur(8px);
            color: white; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 10000; border-radius: 22px;
            transform: scale(0.95); transition: all 0.25s ease;
        }
        .action-card.expanded .success-overlay { border-radius: 0; }
        .success-overlay.show { opacity: 1; transform: scale(1); }
        .success-title { font-size: min(4.5vh, 36px); font-weight: 700; margin-bottom: 6px; }
        .success-text { font-size: min(2.8vh, 24px); color: #f0fdf4; font-weight: 500; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h1 class="app-title">☕ Break Recorder</h1>
            <div class="controls-group">
                <div class="gender-toggle" id="gender-toggle" onclick="toggleGender(event)">👦 ชาย (ครับ)</div>
                <div class="mute-toggle" id="mute-toggle" onclick="toggleMute(event)">🔊 เปิดเสียง</div>
                <div class="theme-toggle" onclick="toggleDarkMode(event)">🌙 โหมดกลางคืน</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="dash-header">
                <span class="dash-title">📊 สรุปโควตาเวลาพักวันนี้</span>
                <div class="quota-setting">
                    โควตา: <input type="number" id="quota-input" class="quota-input" min="1" oninput="updateQuota(this.value)"> นาที
                </div>
            </div>
            <div class="time-grid">
                <div class="time-box">
                    <span class="time-val" id="quota-remain">60</span>
                    <span class="time-lbl">นาทีที่เหลืออยู่</span>
                </div>
                <div class="time-box">
                    <span class="time-val" id="quota-used">0</span>
                    <span class="time-lbl">ใช้ไปแล้ว (นาที)</span>
                </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>

        <!-- พื้นที่แสดงกิจกรรม (สร้างจาก JS) -->
        <div id="activities-container" style="display: flex; flex-direction: column; gap: 16px;"></div>
        
        <div class="add-act-btn" onclick="openModal(-1)">+ เพิ่มกิจกรรมใหม่</div>

        <div class="history-box">
            <div class="history-title">
                <span>📜 ประวัติการพักวันนี้</span>
                <div class="history-actions">
                    <span class="btn-copy-summary" onclick="copySummary()">📋 คัดลอก</span>
                    <span class="btn-export-csv" onclick="exportCSV()">📥 ส่งออก CSV</span>
                    <span class="btn-clear-history" onclick="clearLogs()">ล้างประวัติ</span>
                </div>
            </div>
            <div id="log-container"></div>
            <div id="pagination-container"></div>
        </div>
    </div>

    <!-- Modal จัดการกิจกรรม -->
    <div class="modal-overlay" id="activity-modal">
        <div class="modal-box">
            <h3 id="modal-title" style="margin: 0; color: #334155;">เพิ่มกิจกรรม</h3>
            <input type="text" id="act-name" placeholder="ชื่อกิจกรรม (เช่น ชงกาแฟ)">
            <input type="text" id="act-emoji" placeholder="อิโมจิ (เช่น ☕)">
            <input type="number" id="act-limit" placeholder="เวลาจำกัด (นาที) - ใส่ 0 ถ้าไม่มีลิมิต">
            <select id="act-theme">
                <option value="purple">ธีมสีม่วง 🔮</option>
                <option value="yellow">ธีมสีเหลือง 🌟</option>
                <option value="green">ธีมสีเขียว 🍀</option>
                <option value="pink">ธีมสีชมพู 🌸</option>
                <option value="blue">ธีมสีฟ้า 💧</option>
            </select>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; margin-top: 5px;">
                <input type="checkbox" id="act-istoilet"> ไม่หักโควตาเวลาหลัก (เช่น ห้องน้ำ)
            </label>
            <div class="modal-btn-group">
                <button class="modal-btn" onclick="saveActivity()" style="background: #38bdf8; color: white;">บันทึก</button>
                <button class="modal-btn" onclick="closeModal()" style="background: #e2e8f0; color: #475569;">ยกเลิก</button>
            </div>
            <button id="btn-delete" class="modal-btn" onclick="deleteActivity()" style="background: #ef4444; color: white; display: none; margin-top: 0;">ลบกิจกรรมนี้</button>
        </div>
    </div>

    <script>
        // 🎨 ธีมสีสำหรับสร้างการ์ดอัตโนมัติ
        const themes = {
            purple: { grad: 'linear-gradient(135deg, #e9d5ff 0%, #c084fc 100%)', text: '#4c1d95', expandLight: 'radial-gradient(circle, #f3e8ff 0%, #ffffff 100%)', expandDark: 'radial-gradient(circle, #2e1065 0%, #0f172a 100%)', particle: '#c084fc', hover: 'rgba(192, 132, 252, 0.6)' },
            yellow: { grad: 'linear-gradient(135deg, #fef08a 0%, #facc15 100%)', text: '#713f12', expandLight: 'radial-gradient(circle, #fef9c3 0%, #ffffff 100%)', expandDark: 'radial-gradient(circle, #451a03 0%, #0f172a 100%)', particle: '#facc15', hover: 'rgba(250, 204, 21, 0.6)' },
            green: { grad: 'linear-gradient(135deg, #bbf7d0 0%, #4ade80 100%)', text: '#14532d', expandLight: 'radial-gradient(circle, #dcfce7 0%, #ffffff 100%)', expandDark: 'radial-gradient(circle, #064e3b 0%, #0f172a 100%)', particle: '#4ade80', hover: 'rgba(74, 222, 128, 0.6)' },
            pink: { grad: 'linear-gradient(135deg, #fecdd3 0%, #fb7185 100%)', text: '#881337', expandLight: 'radial-gradient(circle, #ffe4e6 0%, #ffffff 100%)', expandDark: 'radial-gradient(circle, #4c0519 0%, #0f172a 100%)', particle: '#fb7185', hover: 'rgba(251, 113, 133, 0.6)' },
            blue: { grad: 'linear-gradient(135deg, #bae6fd 0%, #38bdf8 100%)', text: '#0c4a6e', expandLight: 'radial-gradient(circle, #e0f2fe 0%, #ffffff 100%)', expandDark: 'radial-gradient(circle, #0c4a6e 0%, #0f172a 100%)', particle: '#38bdf8', hover: 'rgba(56, 189, 248, 0.6)' }
        };

        const defaultActivities = [
            { id: 1, name: 'ไปเอาอาหาร', emoji: '🍧', theme: 'purple', limit: 0, isToilet: false },
            { id: 2, name: 'กินข้าว', emoji: '🍙', theme: 'yellow', limit: 0, isToilet: false },
            { id: 3, name: 'พักเบรก', emoji: '🍀', theme: 'green', limit: 0, isToilet: false },
            { id: 4, name: 'ซื้ออาหาร', emoji: '🍭', theme: 'pink', limit: 0, isToilet: false },
            { id: 5, name: 'เข้าห้องน้ำ', emoji: '🧼', theme: 'blue', limit: 0, isToilet: true }
        ];

        let activeBreak = null;
        let showAllLogs = false;
        let timerInterval = null;
        let isMuted = localStorage.getItem('is_muted') === 'true';
        let gender = localStorage.getItem('gender') || 'male';
        let editingIndex = -1;

        // 🔊 ระบบเสียง
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (isMuted) return;
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'pop') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(1174.66, audioCtx.currentTime + 0.15); 
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'welcome') { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16); 
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
                } else if (type === 'alert') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e) {}
        }

        function triggerParticles(cardElement, color, isBubble) {
            for (let i = 0; i < 18; i++) {
                const particle = document.createElement('div'); particle.classList.add('particle');
                const size = Math.random() * (isBubble ? 14 : 8) + 6;
                particle.style.width = `${size}px`; particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 80 + 10}%`; particle.style.bottom = '20px';
                particle.style.setProperty('--dx', `${Math.random() * 100 - 50}px`);
                particle.style.animationDelay = `${Math.random() * 0.3}s`;
                particle.style.animationDuration = `${Math.random() * 0.8 + 0.7}s`;
                if (isBubble) { particle.style.background = 'transparent'; particle.style.border = `2px solid ${color}`; particle.style.boxShadow = `inset 0 0 5px ${color}`; } 
                else { particle.style.background = color; particle.style.boxShadow = `0 0 8px ${color}`; }
                cardElement.appendChild(particle); setTimeout(() => particle.remove(), 1200);
            }
        }

        // ⚙️ Toggles
        function toggleDarkMode(event) {
            event.stopPropagation(); document.body.classList.toggle('dark-mode');
            document.querySelector('.theme-toggle').innerHTML = document.body.classList.contains('dark-mode') ? '☀️ โหมดกลางวัน' : '🌙 โหมดกลางคืน';
            // Update modal text color fix
            document.getElementById('modal-title').style.color = document.body.classList.contains('dark-mode') ? '#f8fafc' : '#334155';
        }
        function toggleMute(event) { event.stopPropagation(); isMuted = !isMuted; localStorage.setItem('is_muted', isMuted); updateHeaderTexts(); }
        function toggleGender(event) { event.stopPropagation(); gender = gender === 'male' ? 'female' : 'male'; localStorage.setItem('gender', gender); updateHeaderTexts(); }
        
        function updateHeaderTexts() {
            document.getElementById('mute-toggle').innerHTML = isMuted ? '🔇 ปิดเสียง' : '🔊 เปิดเสียง';
            document.getElementById('gender-toggle').innerHTML = gender === 'male' ? '👦 ชาย (ครับ)' : '👩 หญิง (ค่ะ)';
        }

        function getThaiTimeString(dateObj = new Date()) {
            const utc = dateObj.getTime() + (dateObj.getTimezoneOffset() * 60000);
            const thaiTime = new Date(utc + (3600000 * 7));
            return `${String(thaiTime.getHours()).padStart(2, '0')}:${String(thaiTime.getMinutes()).padStart(2, '0')} น.`;
        }

        function performCopy(text) {
            const tempInput = document.createElement("textarea"); tempInput.value = text;
            document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy"); document.body.removeChild(tempInput);
        }

        function showSuccessOverlay(cardElement, title, text, duration = 850) {
            const overlay = cardElement.querySelector('.success-overlay');
            cardElement.querySelector('.result-title').textContent = title;
            cardElement.querySelector('.result-text').textContent = text;
            overlay.classList.add('show'); setTimeout(() => overlay.classList.remove('show'), duration);
        }

        function updateQuota(val) {
            let quota = parseInt(val); if (isNaN(quota) || quota < 1) quota = 60;
            localStorage.setItem('daily_quota', quota); renderDashboardAndLogs();
        }

        // 🧩 สร้างปุ่มกิจกรรมอัตโนมัติ
        function renderActivities() {
            const container = document.getElementById('activities-container');
            container.innerHTML = '';
            let activities = JSON.parse(localStorage.getItem('activities')) || defaultActivities;
            
            activities.forEach((act, index) => {
                const t = themes[act.theme] || themes['purple'];
                const card = document.createElement('div');
                card.className = 'action-card';
                card.style.setProperty('--hover-color', t.hover);
                card.style.setProperty('--expand-bg-light', t.expandLight);
                card.style.setProperty('--expand-bg-dark', t.expandDark);
                
                card.onclick = (e) => { if(!e.target.closest('.edit-btn') && !e.target.closest('.back-box')) startBreak(index, card); };

                let limitText = act.limit > 0 ? ` (ลิมิต ${act.limit} น.)` : '';

                card.innerHTML = `
                    <div class="edit-btn" onclick="openModal(${index}, event)">✏️</div>
                    <div class="capsule" style="background: ${t.grad}; color: ${t.text};">
                        <span>${act.name}</span>
                        <div class="live-timer">00:00</div>
                    </div>
                    <div class="helper-text">คลิกแจ้งเวลาพัก ${act.emoji}${limitText}</div>
                    <div class="back-box" onclick="endBreak(${index}, this.parentElement, event)">
                        <div class="back-title">กลับมาแล้ว</div>
                    </div>
                    <div class="success-overlay">
                        <div class="success-title result-title">คัดลอกสำเร็จ! ✨</div>
                        <div class="success-text result-text"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 📝 ระบบ Modal จัดการกิจกรรม
        function openModal(index, event) {
            if(event) event.stopPropagation();
            editingIndex = index;
            let activities = JSON.parse(localStorage.getItem('activities')) || defaultActivities;
            
            if (index >= 0) {
                const act = activities[index];
                document.getElementById('modal-title').textContent = 'แก้ไขกิจกรรม';
                document.getElementById('act-name').value = act.name;
                document.getElementById('act-emoji').value = act.emoji;
                document.getElementById('act-limit').value = act.limit || 0;
                document.getElementById('act-theme').value = act.theme || 'purple';
                document.getElementById('act-istoilet').checked = act.isToilet;
                document.getElementById('btn-delete').style.display = 'block';
            } else {
                document.getElementById('modal-title').textContent = 'เพิ่มกิจกรรมใหม่';
                document.getElementById('act-name').value = '';
                document.getElementById('act-emoji').value = '✨';
                document.getElementById('act-limit').value = '';
                document.getElementById('act-theme').value = 'purple';
                document.getElementById('act-istoilet').checked = false;
                document.getElementById('btn-delete').style.display = 'none';
            }
            document.getElementById('modal-title').style.color = document.body.classList.contains('dark-mode') ? '#f8fafc' : '#334155';
            document.getElementById('activity-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('activity-modal').style.display = 'none'; }

        function saveActivity() {
            let activities = JSON.parse(localStorage.getItem('activities')) || defaultActivities;
            const newAct = {
                id: editingIndex >= 0 ? activities[editingIndex].id : Date.now(),
                name: document.getElementById('act-name').value || 'กิจกรรมใหม่',
                emoji: document.getElementById('act-emoji').value || '✨',
                limit: parseInt(document.getElementById('act-limit').value) || 0,
                theme: document.getElementById('act-theme').value,
                isToilet: document.getElementById('act-istoilet').checked
            };

            if (editingIndex >= 0) activities[editingIndex] = newAct;
            else activities.push(newAct);
            
            localStorage.setItem('activities', JSON.stringify(activities));
            closeModal(); renderActivities();
        }
        
        function deleteActivity() {
            if(confirm('ต้องการลบกิจกรรมนี้ใช่หรือไม่?')) {
                let activities = JSON.parse(localStorage.getItem('activities')) || defaultActivities;
                activities.splice(editingIndex, 1);
                localStorage.setItem('activities', JSON.stringify(activities));
                closeModal(); renderActivities();
            }
        }

        // ⏱️ ระบบเวลาพัก
        function startBreak(index, cardElement) {
            if (cardElement.classList.contains('expanded')) return;
            
            let activities = JSON.parse(localStorage.getItem('activities')) || defaultActivities;
            const act = activities[index];
            const t = themes[act.theme] || themes['purple'];

            playSound('pop'); triggerParticles(cardElement, t.particle, act.isToilet);

            const suffix = gender === 'male' ? 'ครับ' : 'ค่ะ';
            const now = new Date(); const timeString = getThaiTimeString(now);
            const textToCopy = `${act.name} ${timeString} ${suffix}`;
            performCopy(textToCopy);

            activeBreak = { action: act.name, startTime: now.getTime(), startStr: timeString, limit: act.limit, isToilet: act.isToilet };

            const timerDisplay = cardElement.querySelector('.live-timer'); timerDisplay.textContent = '00:00';
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!activeBreak) return;
                const elapsedSecs = Math.floor((Date.now() - activeBreak.startTime) / 1000);
                timerDisplay.textContent = `${String(Math.floor(elapsedSecs / 60)).padStart(2, '0')}:${String(elapsedSecs % 60).padStart(2, '0')}`;
            }, 1000);

            showSuccessOverlay(cardElement, 'บันทึกเวลาเริ่มพัก! 🍮', textToCopy);
            setTimeout(() => cardElement.classList.add('expanded'), 120);
        }

        function endBreak(index, cardElement, event) {
            event.stopPropagation(); playSound('welcome');
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

            const suffix = gender === 'male' ? 'ครับ' : 'ค่ะ';
            const textToCopy = `กลับมาแล้ว ${suffix}`; performCopy(textToCopy);

            let alertMsg = null;

            if (activeBreak) {
                const diffMs = new Date().getTime() - activeBreak.startTime;
                let diffMins = Math.max(1, Math.round(diffMs / 60000)); 
                if (activeBreak.isToilet) diffMins = 0;
                
                // แจ้งเตือนถ้านานเกินขีดจำกัดที่ตั้งไว้
                if (activeBreak.limit > 0 && diffMins > activeBreak.limit) {
                    alertMsg = `⚠️ แจ้งเตือนเวลาเกินลิมิต!\n\nกิจกรรม: ${activeBreak.action}\nขีดจำกัดที่ตั้งไว้: ${activeBreak.limit} นาที\nเวลาที่คุณใช้ไปจริง: ${diffMins} นาที`;
                }
                
                saveLog(activeBreak.action, activeBreak.startStr, getThaiTimeString(new Date()), diffMins);
                activeBreak = null;
            }

            cardElement.classList.remove('expanded');
            setTimeout(() => {
                showSuccessOverlay(cardElement, 'บันทึกกลับมาแล้ว! 🏠', textToCopy, 1200);
                if(alertMsg) { playSound('alert'); setTimeout(() => alert(alertMsg), 150); }
            }, 80);
        }

        function saveLog(action, start, end, duration) {
            let logs = JSON.parse(localStorage.getItem('break_logs') || '[]');
            logs.push({ date: new Date().toDateString(), action, start, end, duration });
            localStorage.setItem('break_logs', JSON.stringify(logs)); renderDashboardAndLogs();
        }

        // 📋 สรุป และ ส่งออก CSV
        function copySummary() {
            const today = new Date().toDateString();
            const logs = JSON.parse(localStorage.getItem('break_logs') || '[]').filter(log => log.date === today);
            if (logs.length === 0) { alert("ยังไม่มีประวัติของวันนี้"); return; }
            
            let dailyQuota = parseInt(localStorage.getItem('daily_quota') || '60');
            let totalUsed = 0; logs.forEach(log => totalUsed += log.duration);
            
            const now = new Date(); const dateStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            let sumText = `📋 รายงานสรุปเวลาพัก ${dateStr}\n----------------------------------------\n`;
            logs.forEach((log, i) => sumText += `${i + 1}. ${log.action} (${log.start} - ${log.end}) | ${log.duration === 0 ? "ไม่หักโควต้า" : `รวม: ${log.duration} นาที`}\n`);
            sumText += `----------------------------------------\n⏱️ โควตาทั้งหมด: ${dailyQuota} นาที\n📊 ใช้ไปแล้ว: ${totalUsed} นาที\n🔋 คงเหลือ: ${Math.max(0, dailyQuota - totalUsed)} นาที`;
            
            performCopy(sumText); alert("คัดลอกสรุปไปยัง Clipboard แล้ว! ✨");
        }

        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('break_logs') || '[]');
            if (logs.length === 0) { alert("ไม่มีข้อมูลประวัติให้ส่งออก"); return; }
            
            // ใช้ \uFEFF ด้านหน้าเพื่อให้ Excel เปิดภาษาไทยได้โดยไม่เพี้ยน (BOM)
            let csv = "\uFEFFวันที่,กิจกรรม,เวลาเริ่ม,เวลากลับ,ใช้เวลา (นาที)\n";
            logs.forEach(log => { csv += `${log.date},${log.action},${log.start},${log.end},${log.duration}\n`; });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `Break_History.csv`;
            a.click(); URL.revokeObjectURL(url);
        }

        function clearLogs() { if(confirm("ต้องการล้างประวัติวันนี้ใช่หรือไม่?")) { localStorage.removeItem('break_logs'); renderDashboardAndLogs(); } }
        function toggleLogPagination() { showAllLogs = !showAllLogs; renderDashboardAndLogs(); }

        function renderDashboardAndLogs() {
            const today = new Date().toDateString();
            const logs = JSON.parse(localStorage.getItem('break_logs') || '[]');
            const todayLogs = logs.filter(log => log.date === today).reverse();
            
            let dailyQuota = parseInt(localStorage.getItem('daily_quota') || '60');
            document.getElementById('quota-input').value = dailyQuota;

            let totalUsed = 0; todayLogs.forEach(log => totalUsed += log.duration);

            const logContainer = document.getElementById('log-container');
            const paginationContainer = document.getElementById('pagination-container');
            
            if (todayLogs.length === 0) {
                logContainer.innerHTML = '<div class="empty-log">ยังไม่มีประวัติการพักสำหรับวันนี้</div>'; paginationContainer.innerHTML = '';
            } else {
                const displayedLogs = showAllLogs ? todayLogs : todayLogs.slice(0, 5);
                let tableHtml = `<table class="history-table"><thead><tr><th>กิจกรรม</th><th>เริ่ม</th><th>กลับ</th><th>รวม</th></tr></thead><tbody>`;
                displayedLogs.forEach(log => {
                    const isZero = log.duration === 0;
                    tableHtml += `<tr><td><strong>${log.action}</strong></td><td>${log.start}</td><td>${log.end}</td>
                        <td><span style="color:${isZero ? '#38bdf8' : '#c084fc'}; font-weight:bold;">${isZero ? '0 น. 🌟' : log.duration + ' น.'}</span></td></tr>`;
                });
                tableHtml += '</tbody></table>'; logContainer.innerHTML = tableHtml;

                paginationContainer.innerHTML = todayLogs.length > 5 
                    ? `<div class="pagination-btn" onclick="toggleLogPagination()">${showAllLogs ? 'ย่อกลับ' : `ดูเพิ่มเติม (อีก ${todayLogs.length - 5} รายการ)`}</div>` 
                    : '';
            }

            const remain = Math.max(0, dailyQuota - totalUsed);
            document.getElementById('quota-used').textContent = totalUsed; document.getElementById('quota-remain').textContent = remain;
            
            const progressPercent = Math.max(0, (remain / dailyQuota) * 100);
            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = `${progressPercent}%`;
            progressFill.style.background = progressPercent < 25 ? 'linear-gradient(90deg, #f43f5e, #fb7185)' : 'linear-gradient(90deg, #38bdf8, #c084fc)';
        }

        window.onload = () => { updateHeaderTexts(); renderActivities(); renderDashboardAndLogs(); };
    </script>
</body>
</html>
